<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header class="mb-8">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <h2 class="btn-ghost text-2xl font-bold space-x-6"><i class="fa-brands fa-github"></i> GitHub Issues
                    TrackeryUI</h2>
            </div>


            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary text-[18px]">Search</button>
            </div>
        </div>
    </header>

    <main class="w-full lg:w-[80%] mx-auto">
        <!-- All, open, closed buttons -->
        <section class=" bg-base-100 shadow-sm bg-base-200 p-8 mb-5">
            <div class="flex justify-center lg:justify-start space-x-4">
                <button onclick="toggleStyle('all-btn'), filterIssues('all')" id="all-btn"
                    class="btn btn-primary text-white">All</button>
                <button onclick="toggleStyle('open-btn'), filterIssues('open')" id="open-btn" class="btn">Open</button>
                <button onclick="toggleStyle('closed-btn'), filterIssues('closed')" id="closed-btn"
                    class="btn">Closed</button>
            </div>
        </section>

        <section class=" bg-base-100py-5 py-5  shadow bg-base-300">
            <div class="flex justify-between items-center mx-8">
                <div class="flex gap-3">
                    <div class="flex items-center">
                        <img class="border-8 border-[#4A00FF50] rounded-full" src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h3 class="font-semibold text-2xl"><span id="total-issue">0</span> Issues</h3>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="space-x-3">
                    <span class="font-semibold text-[#00A96E]">Open</span>
                    <span class="font-semibold text-[#A855F7]">Closed</span>
                </div>
            </div>

            <hr class="my-6">

            <!-- All Cards -->
            <div id="card-container" class="mx-8 grid grid-cols-1 md:grid-cols-4 gap-3">

                <!-- card 1 -->

                    </div>

                    <h3 class="font-semibold text-xl">Fix navigation menu on mobile devices</h3>
                    <p class="text-gray-500">The navigation menu doesn't collapse properly on mobile
                        devices...</p>

                    <div class="space-x-3">
                        <span
                            class="bg-red-200 text-[12px] py-1 px-3 rounded-[15px] text-red-500 font-medium border">BUG</span>
                        <span
                            class="bg-[#FDE68A] text-[12px] py-1 px-3 rounded-[15px] text-[#D97706] font-medium border">HELP
                            WANTED</span>
                    </div>

                    <div class="space-y-4">
                        <p class="text-gray-500 text-[12px]">#1 by john_doe</p>
                        <p class="text-gray-500 text-[12px]">1/15/2024</p>
                    </div> -->



            </div>
        </section>


        <!-- You can open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_4.showModal()">open modal</button> -->
        <dialog id="details_modal" class="modal">
            <div class="modal-box w-11/12 max-w-5xl">
                <div id="details-container" class="">

                    <div class="">
                        <div class="text-start p-6 space-y-6 rounded-xl shadow bg-base-200">
                            <h3 class="font-semibold text-xl">Fix navigation menu on mobile devices</h3>
                            <p class="text-[14px] text-gray-500"><span>Opened</span> • Opened by Fahim Ahmed •
                                22/02/2026</p>
                            <div class="space-x-3">
                                <span
                                    class="bg-red-200 text-[12px] py-1 px-2 rounded-[15px] text-red-500 border">BUG</span>
                                <span
                                    class="bg-[#FDE68A] text-[12px] py-1 px-2 rounded-[15px] text-[#D97706] border">HELP
                                    WANTED</span>
                            </div>
                            <div class="flex justify-between items-center bg-base-300 py-2 px-4 rounded-xl">
                                <div class="space-y-1">
                                    <p class="text-gray-500">Assigne:</p>
                                    <p class="font-semibold">Tawsif Sir</p>
                                </div>
                                <div class="space-y-1">
                                    <p class="text-gray-500">Priority:</p>
                                    <p
                                        class="border bg-red-500 text-white text-[12px] rounded-[15px] px-2 py-1 text-center">
                                        High</p>
                                </div>
                                </p>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>

    <script src="./script.js"></script>
